<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ArchWander</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mapillary-js@4/dist/mapillary.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <style>
    :root {
      --bg: #F7F7F5;
      --surface: #FFFFFF;
      --border: #E8E8E4;
      --text-primary: #111111;
      --text-secondary: #787878;
      --accent: #111111;
      --sidebar-w: 300px;
      --panel-w: 400px;
      --header-h: 120px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text-primary);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 18px; gap: 12px; z-index: 1000; flex-shrink: 0;
    }
    .header-top-row {
      display: contents;
    }
    .logo {
      font-size: 14px; font-weight: 600; letter-spacing: -0.3px;
      white-space: nowrap; display: flex; align-items: center; gap: 8px;
    }
    .logo-icon {
      width: 28px; height: 28px; background: #111; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-img {
      height: 90px; width: auto; display: block; flex-shrink: 0;
    }
    .logo-sub { font-weight: 300; color: var(--text-secondary); }
    .search-wrap { flex: 1; max-width: 360px; position: relative; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    #search {
      width: 100%; height: 34px;
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0 12px 0 34px; font-size: 13px; font-family: inherit;
      background: var(--bg); outline: none; transition: border-color 0.2s;
    }
    #search:focus { border-color: #999; }
    .map-toggle {
      display: flex; border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; flex-shrink: 0;
    }
    .map-toggle button {
      padding: 6px 12px; font-size: 12px; font-family: inherit;
      border: none; background: transparent; cursor: pointer;
      color: var(--text-secondary); transition: all 0.15s; white-space: nowrap;
    }
    .map-toggle button.active { background: #111; color: #fff; }
    #gps-btn {
      height: 34px; padding: 0 13px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 12px; font-family: inherit; background: white;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      white-space: nowrap; flex-shrink: 0; transition: all 0.2s;
    }
    #gps-btn:hover { border-color: #111; }
    #gps-btn.locating { border-color: #4F46E5; color: #4F46E5; }
    #gps-btn.located  { border-color: #15803D; color: #15803D; }

    /* Language dropdown */
    .lang-dropdown { position: relative; flex-shrink: 0; }
    #lang-btn {
      height: 34px; padding: 0 11px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 12px; font-family: inherit; background: white;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      white-space: nowrap; transition: all 0.2s; color: var(--text-secondary);
    }
    #lang-btn:hover { border-color: #111; color: #111; }
    #lang-btn.open  { border-color: #111; color: #111; }
    .lang-menu {
      display: none; position: absolute; right: 0; top: calc(100% + 6px);
      background: white; border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,0.10);
      min-width: 148px; z-index: 9999; overflow: hidden;
    }
    .lang-menu.open { display: block; }
    .lang-opt {
      width: 100%; padding: 10px 14px; text-align: left;
      background: none; border: none; cursor: pointer;
      font-size: 13px; font-family: inherit; color: var(--text-primary);
      display: flex; align-items: center; gap: 9px; transition: background 0.1s;
    }
    .lang-opt:hover { background: var(--bg); }
    .lang-opt .lo-check { width: 12px; font-size: 11px; color: #111; font-weight: 700; flex-shrink: 0; }
    /* Mobile: centred popup overlay */
    @media (max-width: 640px) {
      .lang-menu {
        position: fixed; right: auto; top: auto;
        left: 50%; top: 50%; transform: translate(-50%,-50%);
        border-radius: 14px; min-width: 200px;
        box-shadow: 0 12px 48px rgba(0,0,0,0.22);
      }
      .lang-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.35); z-index: 9998;
      }
      .lang-overlay.open { display: block; }
    }

    #menu-btn {
      display: none; width: 34px; height: 34px;
      border: 1px solid var(--border); border-radius: 8px;
      background: white; cursor: pointer; align-items: center;
      justify-content: center; flex-shrink: 0; font-size: 16px;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .app { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── SIDEBAR ─────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      flex-shrink: 0; z-index: 200; position: relative;
    }
    /* Sidebar top: filter active indicator */
    .sb-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
    }
    .sb-top-label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-secondary); }
    .sb-clear { font-size: 11px; color: #4F46E5; background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; display: none; }
    .sb-clear.show { display: block; }
    .sb-clear:hover { background: #EEF2FF; }

    /* ── Street View reopen bar (global — must be outside @media) ── */
    .sv-reopen-bar {
      display: none; align-items: center; gap: 6px;
      width: 100%; padding: 9px 14px; cursor: pointer;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--text-secondary);
      background: var(--surface); border: none;
      border-bottom: 1px solid var(--border);
      user-select: none; transition: background 0.12s; text-align: left;
    }
    .sv-reopen-bar:hover { background: var(--bg); color: var(--text-primary); }
    .sv-reopen-bar .sv-reopen-arr { margin-left: auto; font-size: 9px; color: #999; }
    .sv-reopen-bar.visible { display: flex; }

    /* Filter sections */
    .fsec { border-bottom: 1px solid var(--border); }
    .fsec-hdr {
      width: 100%; padding: 9px 14px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-secondary); background: transparent; border: none;
      cursor: pointer; text-align: left; transition: background 0.12s;
    }
    .fsec-hdr:hover { background: var(--bg); }
    .fsec-arr { margin-left: auto; font-size: 9px; transition: transform 0.2s; color: #999; }
    .fsec.open .fsec-arr { transform: rotate(180deg); }
    .fsec-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #4F46E5;
      flex-shrink: 0; display: none;
    }
    .fsec-dot.show { display: block; }
    /* Per-filter reset badge — appears when a filter section is active */
    .fsec-reset {
      display: none; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 500; letter-spacing: 0;
      text-transform: none; color: #4F46E5;
      background: #EEF2FF; border: 1px solid #C7D2FE;
      border-radius: 4px; padding: 1px 6px; cursor: pointer;
      line-height: 1.5; flex-shrink: 0; transition: background 0.12s;
      white-space: nowrap;
    }
    .fsec-reset.show { display: flex; }
    .fsec-reset:hover { background: #E0E7FF; border-color: #A5B4FC; color: #3730A3; }
    .fsec-body {
      padding: 2px 14px 10px;
      display: flex; flex-wrap: wrap; gap: 5px;
      max-height: 80px; overflow-y: auto;
    }
    /* hide body when section closed — !important overrides display:flex/block on arch-list */
    .fsec:not(.open) .fsec-body { display: none !important; }
    /* Architects list — scrollable column */
    .fsec-body.arch-list {
      display: flex; flex-direction: column; flex-wrap: nowrap;
      max-height: none; overflow-y: auto; gap: 0; padding: 2px 14px 8px;
    }
    .arch-item {
      flex-shrink: 0; /* prevent items compressing inside flex column */
      width: 100%; text-align: left;
      padding: 5px 8px; font-size: 12px;
      border: none; background: none; cursor: pointer;
      color: #333; border-radius: 5px;
      font-family: inherit; transition: background 0.12s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.5;
    }
    .arch-item:hover { background: var(--bg); color: #111; }
    .arch-item.active { background: #111; color: white; }

    /* ── PER-SECTION DRAG HANDLES ────────────────────────── */
    .drag-h-sec {
      height: 5px; cursor: ns-resize; flex-shrink: 0;
      background: var(--bg); border-top: 1px solid var(--border);
      position: relative; transition: background 0.15s;
    }
    .drag-h-sec::after {
      content: ''; position: absolute; top: 1px;
      left: 50%; transform: translateX(-50%);
      width: 20px; height: 3px; border-radius: 2px; background: #ccc;
    }
    .drag-h-sec:hover, .drag-h-sec.dragging { background: #e4e4e0; }
    .drag-h-sec:hover::after, .drag-h-sec.dragging::after { background: #999; }
    /* Filter chips */
    .chip {
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border); font-size: 11px;
      font-family: inherit; cursor: pointer;
      background: white; color: var(--text-secondary); transition: all 0.15s;
    }
    .chip.active { background: #111; border-color: #111; color: white; }

    /* Sort + results bar */
    .list-bar {
      padding: 8px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #list-meta { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
    #sort-sel {
      font-size: 11px; font-family: inherit;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px; background: white; color: var(--text-primary);
      cursor: pointer; outline: none;
    }

    /* Location list */
    .loc-list { flex: 1; overflow-y: auto; }
    .loc-card {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; display: flex; gap: 11px; align-items: flex-start;
      transition: background 0.12s;
    }
    .loc-card:hover { background: var(--bg); }
    .loc-card.active { background: #F0F0EE; }
    .card-img {
      width: 52px; height: 52px; border-radius: 7px;
      object-fit: cover; flex-shrink: 0; background: var(--border);
    }
    .card-thumb-icon {
      width: 52px; height: 52px; border-radius: 7px; flex-shrink: 0;
      background-size: 62%; background-repeat: no-repeat; background-position: center;
      background-blend-mode: multiply;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .card-meta { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
    .card-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .cat-badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px; }
    .year-badge { font-size: 10px; color: var(--text-secondary); }
    /* Access badges */
    .access-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px;
    }
    .access-open  { background: #DCFCE7; color: #15803D; }
    .access-paid  { background: #FEF9C3; color: #A16207; }
    .access-priv  { background: #F3F4F6; color: #6B7280; }
    .no-results { padding: 36px 14px; text-align: center; color: var(--text-secondary); font-size: 13px; line-height: 1.6; }

    /* ── MAP ─────────────────────────────────────────────── */
    #map { flex: 1; z-index: 1; }
    .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 8px !important; overflow: hidden; box-shadow: none !important; }

    /* ── DETAIL PANEL ────────────────────────────────────── */
    .panel {
      width: var(--panel-w); background: rgba(255,255,255,0.88);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-left: 1px solid rgba(232,232,228,0.5);
      display: flex; flex-direction: column; overflow: hidden;
      flex-shrink: 0; position: absolute; right: 0; top: 0; bottom: 0;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      z-index: 500;
    }
    .panel.open { transform: translateX(0); }
    .panel-close {
      position: absolute; top: 12px; right: 12px;
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.35); color: white;
      cursor: pointer; font-size: 16px; display: flex;
      align-items: center; justify-content: center; z-index: 10; line-height: 1;
    }
    .panel-close:hover { background: rgba(0,0,0,0.6); }

    /* Gallery */
    .gallery {
      position: relative; overflow: hidden;
      background: #000; flex-shrink: 0;
      height: 45vh;
      display: flex; align-items: center; justify-content: center;
    }
    .gallery img {
      display: block;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100%; max-height: 100%;
      width: auto; height: auto;
      opacity: 0; transition: opacity 0.3s;
    }
    .gallery img.active { opacity: 1; }
    .g-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.35); border: none; color: white;
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; z-index: 5;
    }
    .g-btn:hover { background: rgba(0,0,0,0.6); }
    .g-prev { left: 10px; }
    .g-next { right: 10px; }
    .g-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 5; }
    .g-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.45); cursor: pointer; transition: background 0.2s; }
    .g-dot.active { background: white; }
    .g-label { position: absolute; bottom: 10px; right: 12px; font-size: 10px; color: rgba(255,255,255,0.6); }

    /* Panel scroll + header */
    .panel-scroll { flex: 1; overflow-y: auto; }
    .panel-head { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
    .p-cat { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; }
    .p-title { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.2; margin-bottom: 3px; }
    .p-sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 9px; }
    .p-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .p-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }

    /* Tabs — horizontally scrollable */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border); padding: 0 18px;
      overflow-x: auto; flex-shrink: 0; gap: 0;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 10px 2px; margin-right: 16px;
      font-size: 12px; cursor: pointer; color: var(--text-secondary);
      border-bottom: 2px solid transparent; transition: all 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .tab.active { color: #111; border-bottom-color: #111; font-weight: 500; }
    .tab-pane { display: none; padding: 18px; }
    .tab-pane.active { display: block; }

    /* Common panel content */
    .desc { font-size: 13px; line-height: 1.75; color: #333; margin-bottom: 14px; }
    .info-row { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { width: 88px; color: var(--text-secondary); flex-shrink: 0; font-size: 11.5px; padding-top: 1px; }
    .info-val { flex: 1; line-height: 1.55; white-space: pre-line; }
    .tour-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 10px; }
    .tour-yes { background: #F0FDF4; color: #15803D; }
    .tour-no  { background: #FFF1F2; color: #BE185D; }
    .btns { margin-top: 16px; display: flex; flex-direction: column; gap: 7px; }
    .btn-p {
      display: block; width: 100%; padding: 11px;
      background: #111; color: white; border: none; border-radius: 8px;
      font-size: 12.5px; font-family: inherit; cursor: pointer;
      text-align: center; text-decoration: none; transition: opacity 0.15s;
    }
    .btn-p:hover { opacity: 0.82; }
    .btn-s {
      display: block; width: 100%; padding: 11px;
      background: transparent; color: #111;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 12.5px; font-family: inherit; cursor: pointer;
      text-align: center; text-decoration: none; transition: background 0.15s;
    }
    .btn-s:hover { background: var(--bg); }

    /* ── STREET VIEW TAB ─────────────────────── */
    .sv-intro {
      font-size: 12px; color: var(--text-secondary);
      line-height: 1.6; margin-bottom: 16px;
    }
    .sv-services { display: flex; flex-direction: column; gap: 9px; }
    .sv-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border); border-radius: 10px;
      text-decoration: none; color: inherit;
      transition: all 0.15s; background: white;
    }
    .sv-card:hover { border-color: #bbb; background: var(--bg); }
    .sv-icon {
      width: 38px; height: 38px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .sv-info { flex: 1; min-width: 0; }
    .sv-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .sv-desc { font-size: 11px; color: var(--text-secondary); }
    .sv-arrow { color: var(--text-secondary); font-size: 14px; }
    .sv-divider { display: flex; align-items: center; gap: 8px; margin: 14px 0 10px; }
    .sv-divider span { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .sv-divider::before, .sv-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .sv-map-mini { height: 130px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 14px; }

    /* ── DRAWINGS TAB ────────────────────────── */
    /* Videos tab */
    .vid-list { display: flex; flex-direction: column; gap: 10px; }
    .vid-card {
      display: flex; gap: 11px; align-items: flex-start;
      text-decoration: none; color: inherit;
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px; background: var(--surface);
      transition: border-color 0.15s, background 0.12s;
    }
    .vid-card:hover { border-color: #bbb; background: var(--bg); }
    .vid-thumb {
      width: 108px; height: 62px; flex-shrink: 0;
      border-radius: 6px; background: #e0e0dd center/cover no-repeat;
      position: relative; overflow: hidden;
    }
    .vid-thumb::after {
      content: '▶'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .vid-info { flex: 1; min-width: 0; }
    .vid-rank { font-size: 9px; font-weight: 700; color: #E63737; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px; }
    .vid-title { font-size: 12px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .vid-meta { font-size: 10.5px; color: var(--text-secondary); }
    .vid-views { font-weight: 600; color: #555; }
    .vid-arrow { color: #bbb; font-size: 13px; flex-shrink: 0; align-self: center; }
    .vid-loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 36px 0; gap: 10px;
      color: var(--text-secondary); font-size: 12px;
    }
    .vid-spinner {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2.5px solid var(--border); border-top-color: #555;
      animation: vid-spin 0.7s linear infinite;
    }
    @keyframes vid-spin { to { transform: rotate(360deg); } }
    .vid-fallback {
      text-align: center; padding: 20px 12px;
      border: 1px dashed var(--border); border-radius: 10px;
    }
    .vid-fallback p { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.5; }
    .vid-yt-link {
      display: inline-block; font-size: 12px; padding: 7px 16px;
      background: #FF0000; color: white; border-radius: 20px;
      text-decoration: none; font-weight: 600;
    }
    .vid-yt-link:hover { background: #cc0000; }
    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 9999;
      align-items: center; justify-content: center;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 67vh; object-fit: contain; border-radius: 4px; }
    .lb-close {
      position: absolute; top: 16px; right: 18px;
      font-size: 28px; color: white; cursor: pointer; line-height: 1;
      background: none; border: none; opacity: 0.8;
    }
    .lb-close:hover { opacity: 1; }
    .lb-caption {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.8); font-size: 12px; white-space: nowrap;
    }

    /* External resources */
    .ext-resources { margin-top: 4px; }
    .ext-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
    .ext-links { display: flex; flex-wrap: wrap; gap: 6px; }
    .ext-link {
      font-size: 11.5px; padding: 5px 12px;
      border: 1px solid var(--border); border-radius: 20px;
      text-decoration: none; color: #333; background: white;
      transition: all 0.15s;
    }
    .ext-link:hover { border-color: #999; background: var(--bg); }

    /* ── CATEGORY COLORS ─────────────────────── */
    .c-sky  { background: #EEF2FF; color: #4338CA; }  /* Skyscrapers     — indigo  */
    .c-his  { background: #FFF7ED; color: #C2410C; }  /* Historic         — orange  */
    .c-inf  { background: #F8FAFC; color: #475569; }  /* Infrastructure   — slate   */
    .c-cul  { background: #FDF4FF; color: #9333EA; }  /* Cultural         — purple  */
    .c-park { background: #F0FDF4; color: #166534; }  /* Parks            — green   */
    .c-rel  { background: #FFFBEB; color: #B45309; }  /* Religious        — amber   */
    .c-aca  { background: #EFF6FF; color: #1D4ED8; }  /* Academic / Inst. — blue    */
    .c-res  { background: #F0FDFA; color: #0F766E; }  /* Residential      — teal    */
    .c-lmk  { background: #F0F9FF; color: #0369A1; }  /* Landmarks        — sky     */
    .c-pub  { background: #F9FAFB; color: #6B7280; }  /* Public           — gray    */
    .c-ret  { background: #FFF1F2; color: #BE185D; }  /* Retail           — pink    */

    /* ── REVIEWS ─────────────────────────────────────────── */
    .star-selector { display: flex; gap: 2px; }
    .star-btn {
      font-size: 22px; cursor: pointer; color: #DDD;
      background: none; border: none; padding: 1px 2px;
      line-height: 1; font-family: inherit; transition: color 0.1s;
    }
    .star-btn.lit { color: #F59E0B; }
    .review-avg {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
      padding: 12px 14px; background: var(--bg); border-radius: 10px;
    }
    .review-avg-score { font-size: 32px; font-weight: 700; letter-spacing: -1.5px; }
    .review-avg-stars { font-size: 14px; color: #F59E0B; margin-bottom: 2px; }
    .review-avg-count { font-size: 11px; color: var(--text-secondary); }
    .review-form {
      background: var(--bg); border-radius: 10px; padding: 14px; margin-bottom: 16px;
    }
    .review-form-title { font-size: 12px; font-weight: 600; margin-bottom: 10px; }
    .review-form-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
    .review-input {
      width: 100%; padding: 7px 10px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: 12px; font-family: inherit; background: white; outline: none;
      transition: border-color 0.2s;
    }
    .review-input:focus { border-color: #999; }
    .review-textarea {
      width: 100%; height: 68px; padding: 7px 10px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: 12px; font-family: inherit; resize: vertical;
      background: white; outline: none; transition: border-color 0.2s;
    }
    .review-textarea:focus { border-color: #999; }
    .review-submit {
      width: 100%; padding: 9px; margin-top: 8px;
      background: #111; color: white; border: none; border-radius: 8px;
      font-size: 12.5px; font-family: inherit; cursor: pointer; transition: opacity 0.15s;
    }
    .review-submit:hover { opacity: 0.82; }
    .review-card { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .review-card:last-child { border-bottom: none; }
    .review-card-stars { color: #F59E0B; font-size: 13px; letter-spacing: 1px; }
    .review-card-meta { font-size: 11px; color: var(--text-secondary); margin: 3px 0 5px; }
    .review-card-text { font-size: 12.5px; line-height: 1.65; color: #333; }
    .review-empty { padding: 18px 0; text-align: center; color: var(--text-secondary); font-size: 12.5px; }
    .review-name-badge {
      display: inline-block; font-size: 11px; font-weight: 500;
      background: #111; color: white; padding: 1px 7px; border-radius: 8px; margin-left: 6px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-thumb { background: #DDD; border-radius: 2px; }

    /* Pilot badge */
    .pilot-badge {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.62); color: rgba(255,255,255,0.82);
      font-size: 10px; padding: 5px 14px; border-radius: 20px;
      pointer-events: none; z-index: 800; white-space: nowrap; letter-spacing: 0.2px;
    }

    /* ── SIDEBAR STREET VIEW PANEL ───────────────────────── */
    .sv-side {
      display: none; position: relative;
      flex-shrink: 0; background: #111; overflow: hidden;
    }
    .sv-side.open { display: block; }
    .sv-side-hdr {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 10px; background: #111;
      height: 36px; position: relative; z-index: 1;
    }
    .sv-side-title { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .sv-svc-group { display: flex; gap: 3px; margin-left: auto; }
    .sv-svc-btn {
      font-size: 10px; font-family: inherit; font-weight: 500;
      padding: 3px 8px; border-radius: 10px;
      border: 1px solid #444; color: #888; background: transparent; cursor: pointer;
      transition: all 0.15s;
    }
    .sv-svc-btn.active { background: #fff; color: #111; border-color: #fff; }
    .sv-svc-btn:hover:not(.active) { border-color: #777; color: #ccc; }
    .sv-close-btn {
      width: 20px; height: 20px; border-radius: 50%;
      background: #333; border: none; color: #999;
      cursor: pointer; font-size: 14px; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; line-height: 1;
    }
    .sv-close-btn:hover { background: #555; color: white; }
    /* Body: absolutely positioned below header, fills remaining height */
    .sv-side-body {
      position: absolute; top: 36px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }
    .sv-side-iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none; display: block;
    }
    /* Mapillary inline viewer */
    #mly-viewer {
      position: absolute; inset: 0;
      display: none; background: #111;
    }
    #mly-viewer .mapillary-js { width: 100%; height: 100%; }
    #mly-status {
      position: absolute; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 16px; text-align: center;
      background: #111; color: #aaa; font-size: 11px; line-height: 1.6;
      z-index: 2;
    }
    #mly-status a { color: #60a5fa; }
    #mly-status code { background: #222; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
    .mly-attrib {
      position: absolute; bottom: 4px; right: 6px; z-index: 10;
      font-size: 9px; color: #bbb; opacity: 0.7;
      pointer-events: none;
    }
    .mly-attrib a { color: #bbb; pointer-events: all; }

    .sv-side-iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none; display: block;
    }
    .sv-iframe-note {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 6px 10px; background: rgba(0,0,0,0.72);
      font-size: 10px; color: rgba(255,255,255,0.7); text-align: center;
      display: none;
    }
    .sv-iframe-note a { color: #adf; text-decoration: none; }
    .sv-iframe-note a:hover { text-decoration: underline; }

    /* Link-card view (used for KartaView) */
    .sv-side-cards {
      position: absolute; inset: 0;
      display: none; flex-direction: column; gap: 6px;
      padding: 10px; overflow-y: auto;
      background: var(--surface);
    }
    .sv-side-cards.show { display: flex; }
    .sv-card-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 9px; background: white;
      text-decoration: none; color: inherit; transition: all 0.15s;
    }
    .sv-card-link:hover { border-color: #999; background: var(--bg); }
    .sv-card-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .sv-card-info { flex: 1; min-width: 0; }
    .sv-card-name { font-size: 12px; font-weight: 600; margin-bottom: 1px; }
    .sv-card-desc { font-size: 10px; color: var(--text-secondary); }
    .sv-card-arr { color: #bbb; font-size: 13px; }

    /* ── DRAG HANDLES ─────────────────────────────────────── */
    .drag-h {
      height: 5px; flex-shrink: 0; cursor: ns-resize;
      background: var(--border); position: relative;
      transition: background 0.15s; z-index: 10;
    }
    .drag-h:hover, .drag-h.dragging { background: #aaa; }
    .drag-h.hidden { display: none; }
    .drag-h::after {
      content: ''; position: absolute;
      left: 50%; transform: translateX(-50%);
      top: 1px; width: 26px; height: 3px;
      border-radius: 2px; background: #ccc;
    }
    .drag-h:hover::after, .drag-h.dragging::after { background: #888; }

    /* ── RESIZE HANDLES ──────────────────────────────────── */
    .sb-resize {
      position: absolute; right: -3px; top: 0; bottom: 0; width: 6px;
      cursor: ew-resize; z-index: 300;
      background: transparent; transition: background 0.15s;
    }
    .sb-resize:hover, .sb-resize.dragging { background: rgba(0,0,0,0.15); }
    .panel-resize {
      position: absolute; left: -3px; top: 0; bottom: 0; width: 6px;
      cursor: ew-resize; z-index: 600;
      background: transparent; transition: background 0.15s;
    }
    .panel-resize:hover, .panel-resize.dragging { background: rgba(0,0,0,0.15); }

    /* ── SIDEBAR SECTIONS ─────────────────────────────────── */
    .sb-filters {
      overflow: hidden; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-bottom: 1px solid var(--border);
      height: 240px; /* initial height; drag-resizable via dh-fl */
    }
    /* Architect section expands to fill remaining filter panel height */
    #fsec-arch { flex-shrink: 0; }
    #fsec-arch.open {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }
    #fsec-arch.open > .fsec-body.arch-list {
      flex: 1; min-height: 0;
    }
    .sb-list-wrap { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 80px; }

    /* ── CITY SELECTOR BAR ───────────────────────────────── */
    .city-bar { display: none; } /* merged into header */
    .city-bar-label { display: none; }
    .city-divider { display: none; }
    .header-city-row {
      display: flex; align-items: center; gap: 6px;
      overflow-x: auto; flex-shrink: 0;
    }
    .header-city-row::-webkit-scrollbar { display: none; }
    .city-tab {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border); font-size: 12px; font-family: inherit;
      cursor: pointer; background: white; color: var(--text-secondary);
      transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .city-tab:hover:not(.soon) { border-color: #999; color: #111; background: var(--bg); }
    .city-tab.active { background: #111; color: white; border-color: #111; }
    .city-tab.soon { opacity: 0.45; cursor: default; }
    .city-soon-badge {
      font-size: 9px; font-weight: 600; padding: 1px 5px;
      background: #aaa; color: white; border-radius: 8px; letter-spacing: 0.2px;
    }
    .city-tab.active .city-soon-badge { background: rgba(255,255,255,0.3); }

    /* ── MOBILE ─────────────────────────────────────────── */
    #city-select-mobile {
      display: none;
      font-size: 13px; padding: 5px 10px;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      cursor: pointer; font-family: inherit;
    }
    /* ── MARKER SIZE ──────────────────────────────────────────── */
    .m-pin-wrap {
      width: 24px; height: 24px;
      transform: scale(0.75);
      transform-origin: 50% 100%;
      transition: transform 0.18s ease-out;
    }
    #map.zoom-full .m-pin-wrap { transform: scale(1); }
    #map.zoom-out .m-pin-wrap { transform: scale(0.5); }

    /* ── Marker Cluster Icons ────────────────────────────── */
    .cluster-icon {
      background: #111;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 700;
      border-radius: 50%;
      border: 2.5px solid #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .cluster-icon:hover {
      transform: scale(1.12);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    /* 크기 3단계: 개수에 따라 자동 적용 */
    .cluster-sm { width: 32px; height: 32px; font-size: 12px; }
    .cluster-md { width: 42px; height: 42px; font-size: 14px; }
    .cluster-lg { width: 52px; height: 52px; font-size: 15px; }
    @media (max-width: 900px) {
      /* ── Compact mobile header ── */
      header { height: 52px; padding: 0 12px; gap: 8px; }
      .logo-img { height: 32px; }
      .search-wrap { max-width: none; }
      #gps-btn { display: none; }
      #menu-btn { display: flex; order: -1; }
      #city-select-mobile { display: block; flex-shrink: 0; max-width: 110px; }

      /* ── Sidebar overlay ── */
      .app { overflow: visible; }
      .sidebar {
        pointer-events: none;
        position: fixed; left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        transition: transform 0.28s cubic-bezier(.4,0,.2,1);
        box-shadow: 4px 0 20px rgba(0,0,0,0.15);
        z-index: 400;
      }
      .sidebar.open { transform: translateX(0); pointer-events: auto; }

      /* ── Detail panel bottom sheet ── */
      .panel {
        pointer-events: none;
        position: fixed; bottom: 0; left: 0; right: 0; top: 33vh;
        width: 100%; height: auto;
        border-left: none; border-top: 1px solid rgba(232,232,228,0.5);
        border-radius: 20px 20px 0 0;
        background: rgba(255,255,255,0.88); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        transform: translateY(100%);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        z-index: 500;
      }
      .panel.open { transform: translateY(0); pointer-events: auto; }
      #panel-backdrop {
        display: none; position: fixed;
        top: 0; left: 0; right: 0;
        height: 33vh;
        z-index: 490;
      }
      #panel-backdrop.visible { display: block; }
      .panel::before { content: ''; display: block; width: 36px; height: 4px; background: #ccc; border-radius: 2px; margin: 10px auto 4px; flex-shrink: 0; }

      /* ── Hide desktop-only elements ── */
      .map-toggle { display: none; }
      .logo-sub { display: none; }
      .header-city-row { display: none; }

      /* ── Sidebar backdrop ── */
      #sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 350; }
      #sidebar-backdrop.visible { display: block; }
    .sv-reopen-bar {
      display: none; align-items: center; gap: 6px;
      width: 100%; padding: 9px 14px; cursor: pointer;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--text-secondary);
      background: var(--surface); border: none;
      border-bottom: 1px solid var(--border);
      user-select: none; transition: background 0.12s; text-align: left;
    }
    .sv-reopen-bar:hover { background: var(--bg); color: var(--text-primary); }
    .sv-reopen-bar .sv-reopen-arr { margin-left: auto; font-size: 9px; color: #999; }
    .sv-reopen-bar.visible { display: flex; }

      /* ── Gallery: fixed height, aspect-ratio letterbox ── */
      .gallery {
        height: 210px;
        background: rgba(0,0,0,0.15);
        flex-shrink: 0;
      }
      .gallery img {
        width: 100%; height: 100%;
        object-fit: contain;
        background: rgba(0,0,0,0.15);
        position: absolute !important;
        top: 0; left: 0;
        transform: none;
        max-height: unset;
      }
      .gallery img.active { position: absolute !important; }

      /* ── Panel: gallery pinned, content scrolls ── */
      .panel { overflow: hidden; display: flex; flex-direction: column; }
      .panel-scroll {
        flex: 1; min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* ── Sidebar: sv-side pinned, filters+list scroll ── */
      .sv-side { flex-shrink: 0; }
      .drag-h { display: none; }
      .sb-filters {
        flex: 1; height: auto; min-height: 0;
        overflow-y: auto; display: block;
        -webkit-overflow-scrolling: touch;
      }
      .fsec-body.arch-list { max-height: 200px; }
    }
    
    @media (max-width: 480px) {
      header { padding: 0 10px; min-height: 52px; }
      .header-top-row { gap: 6px; }
      #gps-btn span { display: none; }
      .tabs { padding: 0 6px; gap: 0; }
      .tabs button, .tabs .tab { padding: 8px 10px; font-size: 12px; white-space: nowrap; }
      .panel { top: 33vh; height: auto; }
      .gallery { height: 180px; }
      .detail-section { padding: 14px 14px; }
      h2 { font-size: 16px; }
      .panel-close { width: 32px; height: 32px; font-size: 16px; }
    }

    /* ── ADMIN PANEL ─────────────────────────────────────────── */
    .admin-panel {
      position: fixed; inset: 0; background: var(--surface);
      z-index: 10000; display: none; flex-direction: column;
    }
    .admin-panel.open { display: flex; }
    .admin-hdr {
      height: 52px; background: #111; color: white;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; flex-shrink: 0; gap: 12px;
    }
    .admin-hdr-title { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; }
    .admin-hdr-actions { display: flex; align-items: center; gap: 8px; }
    .admin-hdr-count { font-size: 11px; color: #888; margin-right: 4px; }
    .adm-hbtn {
      padding: 5px 13px; border-radius: 6px; font-size: 12px;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
      color: white; cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .adm-hbtn:hover { background: rgba(255,255,255,0.22); }
    .adm-hbtn.adm-hbtn-add { background: #4F46E5; border-color: #4F46E5; }
    .adm-hbtn.adm-hbtn-add:hover { background: #4338CA; }
    .adm-hbtn.adm-hbtn-export { background: #15803D; border-color: #15803D; }
    .adm-hbtn.adm-hbtn-export:hover { background: #166534; }
    .admin-body { flex: 1; overflow-y: auto; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th {
      text-align: left; padding: 10px 14px;
      background: var(--bg); border-bottom: 2px solid var(--border);
      font-size: 10.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.4px; color: var(--text-secondary); position: sticky; top: 0;
    }
    .admin-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .admin-table tr:hover td { background: var(--bg); }
    .admin-table .td-name { font-weight: 500; }
    .adm-btn { padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border); font-size: 11px; cursor: pointer; font-family: inherit; transition: background 0.12s; }
    .adm-edit { background: #EEF2FF; color: #4F46E5; border-color: #C7D2FE; }
    .adm-edit:hover { background: #E0E7FF; }
    .adm-del  { background: #FEF2F2; color: #DC2626; border-color: #FECACA; margin-left: 4px; }
    .adm-del:hover  { background: #FEE2E2; }

    /* Admin modal */
    .adm-modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 11000;
      align-items: flex-start; justify-content: center;
      padding: 24px 16px; overflow-y: auto;
    }
    .adm-modal-bg.open { display: flex; }
    .adm-modal {
      background: white; border-radius: 12px;
      width: 100%; max-width: 780px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      display: flex; flex-direction: column;
    }
    .adm-modal-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 20px; border-bottom: 1px solid var(--border);
      font-size: 14px; font-weight: 600; flex-shrink: 0;
    }
    .adm-modal-hdr button { background: none; border: none; font-size: 20px; cursor: pointer; color: #aaa; line-height: 1; }
    .adm-modal-hdr button:hover { color: #111; }
    .adm-form-body { padding: 20px; overflow-y: auto; }

// Load from localStorage (admin edits) or fall back to hardcoded defaults.
// If the JS data files have grown since the last localStorage snapshot,
// merge in any new entries so newly added locations always appear.
function _loadLocsFromStorage() {
  try {
    const d = localStorage.getItem('archwander_locs_v1');
    if (!d) return null;
    const stored = JSON.parse(d);
    if (LOCS_DEFAULT.length > stored.length) {
      const storedIds = new Set(stored.map(l => l.id));
      const fresh = LOCS_DEFAULT.filter(l => !storedIds.has(l.id)).map(l => ({...l}));
      return [...stored, ...fresh];
    }
    return stored;
  } catch(e) { return null; }
}

// ── Translation helpers ────────────────────────────────────────────
// Single MyMemory request — parallel-safe
async function _myMemoryOne(text) {
  try {
    const r = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0, 500))}&langpair=en|ko`
    );
    const d = await r.json();
    return (d.responseStatus === 200 && d.responseData) ? d.responseData.translatedText : text;
  } catch(e) { return text; }
}

// Translates an array of strings — all requests fire in parallel
async function translateTexts(texts) {
  if (!texts || !texts.length) return [];
  // DeepL: single batch request (fastest — ~200ms)
  if (DEEPL_API_KEY) {
    try {
      const res = await fetch('https://api-free.deepl.com/v2/translate', {
        method: 'POST',
        headers: {
          'Authorization': `DeepL-Auth-Key ${DEEPL_API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ text: texts, target_lang: 'KO', source_lang: 'EN' })
      });
      if (res.ok) {
        const data = await res.json();
        return data.translations.map(tr => tr.text);
      }
    } catch(e) { /* fall through */ }
  }
  // MyMemory fallback — fire all requests in parallel (~500ms total vs 4-6s sequential)
  return Promise.all(texts.map(t => _myMemoryOne(t)));
}

// Priority fields shown in the first visible tab; rest deferred
const TRANS_PRIORITY = ['desc', 'hood', 'addr'];
const TRANS_DEFERRED = ['hours', 'admission', 'transit', 'lastEntry', 'tourInfo', 'walkFrom'];

async function getLocTranslation(loc, onlyPriority = false) {
  const cacheKey = `archwander_trans_ko_${loc.id}`;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const parsed = JSON.parse(cached);
      // If full cache exists, return it; if we only need priority, return early
      if (!onlyPriority || TRANS_PRIORITY.every(k => parsed[k] || !loc[k])) return parsed;
    }
  } catch(e) {}
  const fieldKeys = onlyPriority ? TRANS_PRIORITY : [...TRANS_PRIORITY, ...TRANS_DEFERRED];
  const toTranslate = {};
  fieldKeys.forEach(k => { if (loc[k] && loc[k] !== 'N/A' && loc[k] !== '-') toTranslate[k] = loc[k]; });
  const keys = Object.keys(toTranslate);
  const vals = Object.values(toTranslate);
  if (!keys.length) return {};
  const translated = await translateTexts(vals);
  const result = {};
  keys.forEach((k, i) => { result[k] = translated[i] || toTranslate[k]; });
  if (!onlyPriority) {
    try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch(e) {}
  }
  return result;
}

// Two-phase translation: render priority fields instantly, then update with full translation
async function applyLocTranslation(loc) {
  const guard = () => activeLoc && activeLoc.id === loc.id && LANG === 'ko';
  if (!guard()) return;

  // Phase 1 — priority fields (desc, hood, addr): ~300-500ms
  const priTrans = await getLocTranslation(loc, true);
  if (!guard()) return;
  const ovPane = document.getElementById('pane-overview');
  const viPane = document.getElementById('pane-visit');
  const hrPane = document.getElementById('pane-here');
  if (ovPane) ovPane.innerHTML = buildOverviewTab(loc, priTrans);

  // Phase 2 — all fields (parallel): fires while user reads overview
  const fullTrans = await getLocTranslation(loc, false);
  if (!guard()) return;
  if (ovPane) ovPane.innerHTML = buildOverviewTab(loc, fullTrans);
  if (viPane) viPane.innerHTML = buildVisitTab(loc, fullTrans);
  if (hrPane) hrPane.innerHTML = buildDirectionsTab(loc, fullTrans);
}

// Background prefetch — quietly warm the cache for all LOCS when in Korean
let _prefetchStarted = false;
async function prefetchTranslations() {
  if (_prefetchStarted || LANG !== 'ko') return;
  _prefetchStarted = true;
  const uncached = LOCS.filter(l => !localStorage.getItem(`archwander_trans_ko_${l.id}`));
  for (let i = 0; i < uncached.length; i++) {
    await getLocTranslation(uncached[i], false);
    // Small pause between locations to avoid rate limits on MyMemory
    await new Promise(r => setTimeout(r, 400));
  }
}

const CLUSTER_ZOOM = 15;

function updateMarkerSize() {

// ── Cluster Group 생성 ───────────────────────────────────────
function createClusterGroup() {
  return L.markerClusterGroup({
    // 같은 화면 내 80px 이내 마커는 자동 클러스터
    maxClusterRadius: 80,
    // CLUSTER_ZOOM 이상에서 클러스터 해제 → 카테고리 색상 개별 마커 노출
    disableClusteringAtZoom: CLUSTER_ZOOM,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    animate: true,
    // 클러스터 아이콘: 단색(#111) + 흰 숫자, 크기 3단계
    iconCreateFunction(cluster) {
      const n = cluster.getChildCount();
      const cls = n < 10 ? 'sm' : n < 50 ? 'md' : 'lg';
      const size = n < 10 ? 32 : n < 50 ? 42 : 52;
      return L.divIcon({
        html: `<div class="cluster-icon cluster-${cls}">${n}</div>`,
        className: '',
        iconSize:   [size, size],
        iconAnchor: [size / 2, size / 2]
      });
    }
  });
}

function addMarker(loc) {
  const color = CAT_COLORS[loc.cat] || '#111';
  const icon = L.divIcon({
    className:'',
    html:`<div class="m-pin-wrap"><div style="width:24px;height:24px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3)"></div></div>`,
    iconSize:[24,24], iconAnchor:[12,24]
  });
  const m = L.marker([loc.lat, loc.lng], { icon })
    .bindTooltip(loc.name, { direction:'top', offset:[0,-26], opacity:0.94 })
    .on('click', () => openLoc(loc));
  clusterGroup.addLayer(m);
  markers.push({ loc, m });
}

function buildFilters() {
  // Category
  const cats = ['All', ...new Set(LOCS.map(l => l.cat))];
  buildChipGroup('body-cat', cats, 'cat', cat => cat === 'All' ? 'All' : cat.split(' ')[0], cat => cat);

  // Style
  buildChipGroup('body-style', ['All',...STYLES], 'style', s => s, s => s);

  // Era
  buildChipGroup('body-era', ['All',...ERAS], 'era', e => e, e => e);

  // Access
  buildChipGroup('body-access', ACCESS, 'access',
    a => a === 'All' ? 'All' : `${ACCESS_META[a].icon} ${a}`,
    a => a
  );

  // Architect — scrollable list
  const archWrap = document.getElementById('body-arch');
  ['All', ...ARCHITECTS].forEach(a => {
    const b = document.createElement('button');
    b.className = 'arch-item' + (a === 'All' ? ' active' : '');
    b.textContent = a;
    b.title = a;
    b.onclick = () => setFilter('arch', a);
    archWrap.appendChild(b);
  });
}

function buildChipGroup(containerId, items, key, labelFn, valueFn) {
  const wrap = document.getElementById(containerId);
  items.forEach(item => {
    const b = document.createElement('button');
    b.className = 'chip' + (item === 'All' ? ' active' : '');
    b.textContent = labelFn(item);
    b.title = valueFn(item);
    b.onclick = () => setFilter(key, valueFn(item));
    wrap.appendChild(b);
  });
}

  const bodyId = key === 'arch' ? 'body-arch' : `body-${key}`;
  const selector = key === 'arch' ? '.arch-item' : '.chip';
  document.getElementById(bodyId).querySelectorAll(selector).forEach(b => {

  // Dot indicator

  // Per-section reset badge
  const resetBtn = document.getElementById(`reset-${key}`);
  if (resetBtn) resetBtn.classList.toggle('show', val !== 'All');

  updateClearBtn();
  renderList();
  syncMarkers();
}

  ['cat','style','era','access','arch'].forEach(k => {
    state[k] = 'All';

    const sel = k === 'arch' ? '.arch-item' : '.chip';
    document.getElementById(bodyId).querySelectorAll(sel).forEach(b =>

  renderList();
  syncMarkers();

// FILTERED + SORTED LIST
// ══════════════════════════════════════════════════════════════════
function getFiltered() {
  let list = LOCS.filter(l => l.city === activeCityKey);
  if (state.cat   !== 'All') list = list.filter(l => l.cat === state.cat);
  if (state.style !== 'All') list = list.filter(l => l.styleGroup === state.style);
  if (state.era   !== 'All') {
    const [mn, mx] = ERA_RANGE[state.era];
    list = list.filter(l => l.yr >= mn && l.yr < mx);
  }
  if (state.access !== 'All') list = list.filter(l => l.access === state.access);
  if (state.arch  !== 'All') list = list.filter(l => (l.archs || [l.arch]).includes(state.arch));
  if (state.query) {
    const q = state.query.toLowerCase();
    list = list.filter(l =>
      l.name.toLowerCase().includes(q) || l.arch.toLowerCase().includes(q) ||
      l.style.toLowerCase().includes(q) || l.hood.toLowerCase().includes(q) ||
      l.styleGroup.toLowerCase().includes(q) || l.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  // Sort
  if (state.sort === 'year-asc')  list = [...list].sort((a,b) => a.yr - b.yr);
  if (state.sort === 'year-desc') list = [...list].sort((a,b) => b.yr - a.yr);
  if (state.sort === 'name')      list = [...list].sort((a,b) => a.name.localeCompare(b.name));
  return list;
}

let photoIdx = 0;

function photoUrl(u, mob, role) {
  if (!u) return u;
  // Determine target width by role and viewport
  let w;
  if      (role === 'card')    w = mob ? 80  : 120;   // sidebar thumbnail
  else if (role === 'gallery') w = mob ? 480 : 700;   // gallery panel
  else                         w = mob ? 500 : 800;   // legacy / default

  // Pattern 1: Wikimedia Commons /thumb/hash1/hash2/filename/NNNpx-filename
  // e.g. https://upload.wikimedia.org/wikipedia/commons/thumb/a/b/File.jpg/800px-File.jpg
  const thumbMatch = u.match(/^(https?:\/\/upload\.wikimedia\.org\/.+\/thumb\/[^/]+\/[^/]+\/[^/]+\/)(\d+)px-(.+)$/);
  if (thumbMatch) return `${thumbMatch[1]}${w}px-${thumbMatch[3]}`;

  // Pattern 2: Wikimedia Commons Special:FilePath?width=NNN
  if (u.includes('Special:FilePath') && u.includes('?width='))
    return u.replace(/\?width=\d+/, `?width=${w}`);

  // Pattern 3: Generic ?width= parameter
  if (u.includes('?width='))
    return u.replace(/\?width=\d+/, `?width=${w}`);

  return u;
}

function openLocById(id) { openLoc(LOCS.find(l => l.id === id)); }

function openLoc(loc) {
  activeLoc = loc;
  map.flyTo([loc.lat, loc.lng], 16, { duration:1.1 });

  // Gallery
  photoIdx = 0;
  const gallery = document.getElementById('gallery');
  const isMob = window.innerWidth < 768;
  gallery.querySelectorAll('img').forEach(i => i.remove());
  loc.photos.forEach((src, i) => {
    const img = document.createElement('img');
    img.alt = loc.name;
    if (i === 0) {
      // Load first image immediately
      img.src = photoUrl(src, isMob, 'gallery');
      img.classList.add('active');
    } else {
      // Defer remaining images until actually needed
      img.dataset.src = photoUrl(src, isMob, 'gallery');
      img.loading = 'lazy';
    }
    img.onerror = function() { this.style.display = 'none'; };
    gallery.insertBefore(img, gallery.querySelector('.g-btn'));
  });
  document.getElementById('g-dots').innerHTML =
    loc.photos.map((_, i) => `<div class="g-dot${i===0?' active':''}" onclick="gotoPhoto(${i})"></div>`).join('');
  updateGLabel();

  // Header
  const color = CAT_COLORS[loc.cat] || '#111';
  document.getElementById('panel-head').innerHTML = `
    <div class="p-cat" style="color:${color}">${loc.cat}</div>
    <div class="p-title">${loc.name}</div>
    <div class="p-sub">${loc.arch} &nbsp;·&nbsp; ${loc.yr} &nbsp;·&nbsp; ${loc.style}</div>
    <div class="p-tags">${loc.tags.map(t=>`<span class="p-tag">${t}</span>`).join('')}</div>
  `;

  // Build tabs
  document.getElementById('pane-overview').innerHTML = buildOverviewTab(loc);
  document.getElementById('pane-visit').innerHTML    = buildVisitTab(loc);
  document.getElementById('pane-here').innerHTML     = buildDirectionsTab(loc);
  // Async translation for Korean UI
  if (LANG === 'ko') applyLocTranslation(loc);
  document.getElementById('pane-videos').innerHTML   = buildVideosTab(loc);
  document.getElementById('pane-reviews').innerHTML  = buildReviewsTab(loc);

  switchTab('overview');
  document.getElementById('panel').classList.add('open');
  if (window.innerWidth <= 900) { const _pb = document.getElementById('panel-backdrop'); if (_pb) _pb.classList.add('visible'); }
  renderList();
  showSvSide(loc);

  if (window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('open');
  const bd2=document.getElementById('sidebar-backdrop');if(bd2)bd2.classList.remove('visible');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  const _pb2 = document.getElementById('panel-backdrop'); if (_pb2) _pb2.classList.remove('visible');
  activeLoc = null;
  closeSvSide();
  renderList();
  updateMarkerSize();
}

async function loadVideosForTab(loc) {
  const el = document.getElementById('videos-content');
  if (!el || el.dataset.loaded === loc.id) return;
  el.dataset.loaded = loc.id;

  const cityMap = {'nyc':'New York','sel':'Seoul','lon':'London','tky':'Tokyo'};
  const city = cityMap[loc.city] || '';

  // Specific query: building name + primary architect + city
  const archShort = loc.arch ? loc.arch.split(/[,(+&]/)[0].trim() : '';
  const queryParts = [loc.name, archShort, city, 'architecture'].filter(Boolean);
  const query = queryParts.join(' ');
  const q = encodeURIComponent(query);
  const ytSearchUrl = `https://www.youtube.com/results?search_query=${q}`;

  // No API key configured — show direct YouTube search link
  if (!YOUTUBE_API_KEY) {
    el.innerHTML = `<div class="vid-fallback">
      <p style="margin-bottom:10px">${t('vid_no_key')}</p>
      <a class="vid-yt-link" href="${ytSearchUrl}" target="_blank" rel="noopener">${t('vid_search_yt')}</a>
    </div>`;
    return;
  }

  function abortFetch(ms) {
    const c = new AbortController();
    setTimeout(() => c.abort(), ms);
    return c;
  }

  try {
    // Stage 1: relevance-ordered search, fetch 10 candidates
    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&order=relevance&type=video&maxResults=10&key=${YOUTUBE_API_KEY}`;
    const sr = await fetch(searchUrl, {signal: abortFetch(10000).signal});
    if (!sr.ok) throw new Error(`HTTP ${sr.status}`);
    const sd = await sr.json();
    if (sd.error) throw new Error(sd.error.message);
    const items = (sd.items || []).filter(it => it.id?.videoId);
    if (!items.length) throw new Error('No results found');

    // Stage 2: batch-fetch view counts for all candidates
    const ids = items.map(it => it.id.videoId).join(',');
    const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${YOUTUBE_API_KEY}`;
    const vr = await fetch(statsUrl, {signal: abortFetch(10000).signal});
    const vd = vr.ok ? await vr.json() : {items:[]};
    const statsMap = {};
    (vd.items || []).forEach(v => { statsMap[v.id] = parseInt(v.statistics?.viewCount || '0'); });

    // Stage 3: hybrid scoring — title keyword match (weighted high) + log10(views)
    // This keeps YouTube's relevance as the primary filter while rewarding
    // videos whose titles explicitly mention the building name / architect / city.
    const keywords = [
      loc.name,
      ...loc.name.split(/\s+/),
      archShort,
      ...archShort.split(/\s+/),
      city,
    ].map(k => k.toLowerCase()).filter(k => k.length > 2);

    const scored = items.map((it, rank) => {
      const vid   = it.id.videoId;
      const title = it.snippet.title.toLowerCase();
      const views = statsMap[vid] || 0;
      const kwHits = keywords.reduce((n, kw) => n + (title.includes(kw) ? 1 : 0), 0);
      // keyword match dominates; view count breaks ties; relevance rank as tiebreaker
      const score = kwHits * 20 + Math.log10(views + 1) - rank * 0.1;
      return {
        videoId: vid,
        title:   it.snippet.title,
        author:  it.snippet.channelTitle,
        thumb:   (it.snippet.thumbnails.medium || it.snippet.thumbnails.default || {}).url || '',
        views,
        score,
      };
    });

    scored.sort((a, b) => b.score - a.score);
    el.innerHTML = `<div class="vid-list">${renderVideoCards(scored.slice(0, 3))}</div>`;
  } catch(e) {
    const msg = e.name === 'AbortError' ? t('vid_timeout') : e.message;
    el.innerHTML = `<div class="vid-fallback">
      <p>${t('vid_fail')} (${msg})<br>${t('vid_direct')}</p>
      <a class="vid-yt-link" href="${ytSearchUrl}" target="_blank" rel="noopener">${t('vid_search_yt')}</a>
    </div>`;
  }
}

function renderVideoCards(videos) {
  return videos.map((v, i) => {
    const ytUrl  = `https://www.youtube.com/watch?v=${v.videoId}`;
    const imgUrl = v.thumb || `https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg`;
    const viewsText = v.views ? formatViews(v.views) + ' views · ' : '';
    return `<a class="vid-card" href="${ytUrl}" target="_blank" rel="noopener">
      <div class="vid-thumb" style="background-image:url('${imgUrl}')"></div>
      <div class="vid-info">
        <div class="vid-title">${v.title}</div>
        <div class="vid-meta">${viewsText}${v.author}</div>
      </div>
      <span class="vid-arrow">↗</span>
    </a>`;
  }).join('');
}

function formatViews(n) {
  if (n >= 1e8) return (n/1e6).toFixed(0)+'M';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e4) return (n/1e3).toFixed(0)+'K';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}

function gotoPhoto(idx) {
  const gallery = document.getElementById('gallery');
  const imgs = Array.from(gallery.querySelectorAll('img'));
  // Load current image if deferred
  const cur = imgs[idx];
  if (cur && cur.dataset.src) { cur.src = cur.dataset.src; delete cur.dataset.src; }
  imgs.forEach((img, i) => img.classList.toggle('active', i === idx));
  document.getElementById('g-dots').querySelectorAll('.g-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  photoIdx = idx;
  updateGLabel();
  // Preload next image in background
  const next = imgs[idx + 1];
  if (next && next.dataset.src) { next.src = next.dataset.src; delete next.dataset.src; }
}
function updateGLabel() {
  if (!activeLoc) return;
  document.getElementById('g-label').textContent = `${photoIdx + 1} / ${activeLoc.photos.length}`;
}
function prevPhoto() { if (activeLoc) gotoPhoto((photoIdx - 1 + activeLoc.photos.length) % activeLoc.photos.length); }
function nextPhoto() { if (activeLoc) gotoPhoto((photoIdx + 1) % activeLoc.photos.length); }

function setupVDrag(handleId, targetId, minH, maxH) {
  const handle = document.getElementById(handleId);
  const target = document.getElementById(targetId);
  if (!handle || !target) return;
  let dragging = false, startY = 0, startH = 0;

  const start = y => {

// MAPILLARY INLINE VIEWER
// ══════════════════════════════════════════════════════════════════
async function loadMapillaryViewer(loc) {
  const mlyView   = document.getElementById('mly-viewer');
  const mlyStatus = document.getElementById('mly-status');

  // Token check
  if (!MAPILLARY_TOKEN || MAPILLARY_TOKEN === 'YOUR_MAPILLARY_TOKEN_HERE') {
    mlyStatus.style.display = 'flex';
    mlyStatus.innerHTML = `
      Mapillary token not configured.<br>
      Get a free token at
      <a href="https://www.mapillary.com/developer" target="_blank" rel="noopener">mapillary.com/developer ↗</a>
      then set <code>MAPILLARY_TOKEN</code> in the config section.
    `;
    return;
  }

  // Show loading state
  mlyStatus.style.display = 'flex';
  mlyStatus.innerHTML = 'Loading street-level imagery…';

  try {
    // Fetch nearest image from Mapillary Graph API
    const delta = 0.0015; // ~165m radius
    const bbox  = `${loc.lng - delta},${loc.lat - delta},${loc.lng + delta},${loc.lat + delta}`;
    const resp  = await fetch(
      `https://graph.mapillary.com/images?fields=id&bbox=${bbox}&limit=5&access_token=${MAPILLARY_TOKEN}`
    );
    if (!resp.ok) throw new Error(`Mapillary API error ${resp.status}`);
    const data = await resp.json();

    if (!data.data || data.data.length === 0) {
      mlyStatus.innerHTML = `
        No street-level imagery near this location.<br>
        <a href="https://www.mapillary.com/app/?lat=${loc.lat}&lng=${loc.lng}&z=17" target="_blank" rel="noopener">Browse Mapillary ↗</a>
      `;
      return;
    }

    const imageId = data.data[0].id;
    mlyStatus.style.display = 'none';

    if (!mlyViewer) {
      // First init — create viewer
      mlyViewer = new mapillary.Viewer({
        accessToken: MAPILLARY_TOKEN,
        container:   'mly-viewer',
        imageId:     imageId,
        component:   { cover: false }
      });
    } else {
      // Reuse existing viewer, resize in case panel changed size, then jump to new image
      mlyViewer.resize();
      await mlyViewer.moveTo(imageId);
    }

  } catch(e) {
    console.error('Mapillary viewer error:', e);
    mlyStatus.innerHTML = `
      Could not load imagery.<br>
      <a href="https://www.mapillary.com/app/?lat=${loc.lat}&lng=${loc.lng}&z=17" target="_blank" rel="noopener">Open Mapillary ↗</a>
    `;
  }
}

// REVIEWS & RATINGS
// ══════════════════════════════════════════════════════════════════
const REVIEWS_KEY = 'archwander_reviews_v1';

function loadReviews(locId) {
  try {
    const data = JSON.parse(localStorage.getItem(REVIEWS_KEY) || '{}');
    return data[locId]?.reviews || [];
  } catch(e) { return []; }
}

function saveReview(locId, review) {
  try {
    const data = JSON.parse(localStorage.getItem(REVIEWS_KEY) || '{}');
    if (!data[locId]) data[locId] = { reviews: [] };
    data[locId].reviews.unshift(review);
    localStorage.setItem(REVIEWS_KEY, JSON.stringify(data));
  } catch(e) { console.warn('Review save failed', e); }
}

function starsHtml(n, total = 5, size = 14) {
  let h = '';
  for (let i = 1; i <= total; i++)
    h += `<span style="color:${i <= n ? '#F59E0B' : '#DDD'};font-size:${size}px">★</span>`;
  return h;
}

const reviewStarState = {};

function hoverStar(locId, val) {
  document.querySelectorAll(`#star-sel-${locId} .star-btn`).forEach((b, i) => {
    b.style.color = (i + 1) <= val ? '#F59E0B' : '#DDD';
  });
}
function unhoverStar(locId) {
  const cur = reviewStarState[locId] || 0;
  document.querySelectorAll(`#star-sel-${locId} .star-btn`).forEach((b, i) => {
    b.style.color = (i + 1) <= cur ? '#F59E0B' : '#DDD';
  });
}
function setReviewStar(locId, val) {
  reviewStarState[locId] = val;
  document.querySelectorAll(`#star-sel-${locId} .star-btn`).forEach((b, i) => {
    b.classList.toggle('lit', (i + 1) <= val);
  });
}

function renderReviewList(reviews) {
  if (!reviews.length) return '<div class="review-empty">No reviews yet — be the first to share your experience!</div>';
  return reviews.map(r => `
    <div class="review-card">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="review-card-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)}</span>
        <span class="review-name-badge">${r.name}</span>
      </div>
      <div class="review-card-meta">${r.date}</div>
      ${r.text ? `<div class="review-card-text">${r.text}</div>` : ''}
    </div>
  `).join('');
}

function buildReviewsTab(loc) {
  const reviews = loadReviews(loc.id);
  const avg = reviews.length ? reviews.reduce((s, r) => s + r.stars, 0) / reviews.length : 0;

  const avgBlock = reviews.length ? `
    <div class="review-avg">
      <div class="review-avg-score">${avg.toFixed(1)}</div>
      <div>
        <div class="review-avg-stars">${starsHtml(Math.round(avg), 5, 15)}</div>
        <div class="review-avg-count">${reviews.length} review${reviews.length !== 1 ? 's' : ''}</div>
      </div>
    </div>` : '';

  return `
    ${avgBlock}
    <div class="review-form">
      <div class="review-form-title">Write a Review</div>
      <div style="margin-bottom:10px">
        <div class="review-form-label">Your rating</div>
        <div class="star-selector" id="star-sel-${loc.id}">
          ${[1,2,3,4,5].map(i =>
            `<button class="star-btn" data-val="${i}"
              onmouseover="hoverStar('${loc.id}',${i})"
              onmouseout="unhoverStar('${loc.id}')"
              onclick="setReviewStar('${loc.id}',${i})">★</button>`
          ).join('')}
        </div>
      </div>
      <div style="margin-bottom:8px">
        <div class="review-form-label">Name (optional)</div>
        <input type="text" id="rev-name-${loc.id}" class="review-input" placeholder="Your name">
      </div>
      <div style="margin-bottom:2px">
        <div class="review-form-label">Review</div>
        <textarea id="rev-text-${loc.id}" class="review-textarea"
          placeholder="Share your experience visiting ${loc.name}…"></textarea>
      </div>
      <button class="review-submit" onclick="submitReview('${loc.id}')">Submit Review</button>
    </div>
    <div id="reviews-list-${loc.id}">${renderReviewList(reviews)}</div>
  `;
}

function submitReview(locId) {
  const stars = reviewStarState[locId] || 0;
  if (!stars) { alert('Please select a star rating first.'); return; }

  const nameEl = document.getElementById(`rev-name-${locId}`);
  const textEl = document.getElementById(`rev-text-${locId}`);
  const name = (nameEl?.value.trim()) || 'Anonymous';
  const text = textEl?.value.trim() || '';

  saveReview(locId, {
    stars,
    name,
    text,
    date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
  });

  // Reset form
  delete reviewStarState[locId];
  document.querySelectorAll(`#star-sel-${locId} .star-btn`).forEach(b => {
    b.classList.remove('lit'); b.style.color = '';
  });
  if (nameEl) nameEl.value = '';
  if (textEl) textEl.value = '';

  // Refresh reviews list + avg block
  document.getElementById(`reviews-list-${locId}`).innerHTML = renderReviewList(loadReviews(locId));
  // Update avg display
  const reviews = loadReviews(locId);
  const avg = reviews.reduce((s, r) => s + r.stars, 0) / reviews.length;
  const avgEl = document.querySelector('.review-avg');
  if (avgEl) {
    avgEl.querySelector('.review-avg-score').textContent = avg.toFixed(1);
    avgEl.querySelector('.review-avg-stars').innerHTML = starsHtml(Math.round(avg), 5, 15);
    avgEl.querySelector('.review-avg-count').textContent = `${reviews.length} review${reviews.length !== 1 ? 's' : ''}`;
  } else {
    // Avg block didn't exist before (first review) — rebuild tab
    if (activeLoc?.id === locId) {
      document.getElementById('pane-reviews').innerHTML = buildReviewsTab(activeLoc);
    }
  }
  // Refresh sidebar card rating badge
  renderList();
}

function locateUser() {
  if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
  const btn = document.getElementById('gps-btn');
  btn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude:lat, longitude:lng } = pos.coords;
      if (userMarker) userMarker.remove();
      userMarker = L.circleMarker([lat, lng], { radius:10, fillColor:'#4F46E5', fillOpacity:1, color:'white', weight:3 })
        .addTo(map).bindPopup('📍 You are here').openPopup();
      map.flyTo([lat, lng], 15, { duration:1.3 });
      btn.classList.remove('locating'); btn.classList.add('located');
      setTimeout(() => btn.classList.remove('located'), 4000);
    },
    () => {
      alert('Could not get your location. Check browser permissions.');
      btn.classList.remove('locating');
    }
  );
}

const CAT_CC_MAP = {
  'Skyscrapers':           'c-sky',
  'Historic':              'c-his',
  'Infrastructure':        'c-inf',
  'Cultural':              'c-cul',
  'Parks':                 'c-park',
  'Religious':             'c-rel',
  'Academic / Institution':'c-aca',
  'Residential':           'c-res',
  'Landmarks':             'c-lmk',
  'Public':                'c-pub',
  'Retail':                'c-ret',
};

// Open with Ctrl+Shift+A
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'A') { e.preventDefault(); openAdmin(); }
});

function openAdmin() {
  renderAdminTable();
  document.getElementById('admin-panel').classList.add('open');
}
function closeAdmin() {
  document.getElementById('admin-panel').classList.remove('open');
}

function renderAdminTable() {
  document.getElementById('admin-count').textContent = `${LOCS.length} locations`;
  const saved = localStorage.getItem('archwander_locs_v1');
  document.getElementById('adm-reset-storage').style.display = saved ? 'block' : 'none';
  document.getElementById('admin-tbody').innerHTML = LOCS.map((loc, i) => `
    <tr>
      <td style="color:var(--text-secondary)">${i+1}</td>
      <td class="td-name">${loc.name}</td>
      <td style="color:var(--text-secondary)">${loc.arch}</td>
      <td style="color:var(--text-secondary)">${loc.yr}</td>
      <td><span class="cat-badge ${loc.cc||''}" style="font-size:10px">${loc.cat}</span></td>
      <td>${loc.access ? `<span class="access-badge ${ACCESS_META[loc.access]?.cls||''}" style="font-size:10px">${ACCESS_META[loc.access]?.icon||''} ${loc.access}</span>` : '—'}</td>
      <td>
        <button class="adm-btn adm-edit" onclick="openEditForm('${loc.id}')">Edit</button>
        <button class="adm-btn adm-del"  onclick="confirmDeleteLoc('${loc.id}')">Delete</button>
      </td>
    </tr>
  `).join('');
}

let _admEditId = null;

function openAddForm() {
  _admEditId = null;
  _clearAdmForm();
  document.getElementById('adm-form-title').textContent = 'Add New Location';
  document.getElementById('adm-modal').classList.add('open');
}
function openEditForm(id) {
  _admEditId = id;
  const loc = LOCS.find(l => l.id === id);
  if (!loc) return;
  _fillAdmForm(loc);
  document.getElementById('adm-form-title').textContent = 'Edit Location';
  document.getElementById('adm-modal').classList.add('open');
}
function closeAdmModal() {
  document.getElementById('adm-modal').classList.remove('open');
}

function _clearAdmForm() {
  ['af-name','af-arch','af-yr','af-style','af-styleGroup','af-lat','af-lng',
   'af-addr','af-hood','af-desc','af-hours','af-admission','af-web',
   'af-gmaps','af-wiki','af-archdaily','af-tags','af-photos','af-tourInfo'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('af-tourOk').checked = false;
  document.getElementById('af-cat').value    = 'Landmarks';
  document.getElementById('af-access').value = 'Open to Public';
  document.getElementById('af-era').value    = '2000–Present';
  document.getElementById('af-city').value   = activeCityKey || 'new-york';
}

function _fillAdmForm(loc) {
  const sv = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  sv('af-name',       loc.name);
  sv('af-arch',       loc.arch);
  sv('af-yr',         loc.yr);
  sv('af-style',      loc.style);
  sv('af-styleGroup', loc.styleGroup);
  sv('af-lat',        loc.lat);
  sv('af-lng',        loc.lng);
  sv('af-addr',       loc.addr);
  sv('af-hood',       loc.hood);
  sv('af-desc',       loc.desc);
  sv('af-hours',      loc.hours);
  sv('af-admission',  loc.admission);
  sv('af-web',        loc.web);
  sv('af-gmaps',      loc.gmaps);
  sv('af-wiki',       loc.wiki);
  sv('af-archdaily',  loc.archdaily);
  sv('af-tourInfo',   loc.tourInfo);
  sv('af-tags',       (loc.tags || []).join(', '));
  sv('af-photos',     (loc.photos || []).join('\n'));
  document.getElementById('af-tourOk').checked = !!loc.tourOk;
  document.getElementById('af-cat').value    = loc.cat    || 'Landmarks';
  document.getElementById('af-access').value = loc.access || 'Open to Public';
  document.getElementById('af-era').value    = loc.era    || '2000–Present';
  document.getElementById('af-city').value   = loc.city   || 'new-york';
}

function saveAdmForm() {
  const fv = id => (document.getElementById(id)?.value || '').trim();
  const name = fv('af-name');
  const lat  = parseFloat(fv('af-lat'));
  const lng  = parseFloat(fv('af-lng'));
  if (!name)           { alert('Name is required.'); return; }
  if (isNaN(lat)||isNaN(lng)) { alert('Valid Latitude and Longitude are required.'); return; }

  const cat = fv('af-cat') || 'Landmarks';
  const loc = {
    id:         _admEditId || name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') + '-' + Date.now(),
    name,       arch:       fv('af-arch') || 'Unknown',
    yr:         parseInt(fv('af-yr')) || new Date().getFullYear(),
    cat,        cc:         CAT_CC_MAP[cat] || 'c-lmk',
    style:      fv('af-style'),
    styleGroup: fv('af-styleGroup') || 'Contemporary',
    era:        fv('af-era') || '2000–Present',
    access:     fv('af-access') || 'Open to Public',
    city:       fv('af-city') || 'new-york',
    lat, lng,
    addr:       fv('af-addr'),   hood:     fv('af-hood'),
    desc:       fv('af-desc'),   hours:    fv('af-hours'),
    lastEntry:  '',              admission: fv('af-admission'),
    tourOk:     document.getElementById('af-tourOk').checked,
    tourInfo:   fv('af-tourInfo'), web:    fv('af-web'),
    gmaps:      fv('af-gmaps'),  wiki:     fv('af-wiki'),
    archdaily:  fv('af-archdaily'),
    tags:       fv('af-tags').split(',').map(t=>t.trim()).filter(Boolean),
    photos:     fv('af-photos').split('\n').map(s=>s.trim()).filter(Boolean),
    drawings:   _admEditId ? (LOCS.find(l=>l.id===_admEditId)?.drawings||[]) : []
  };

  if (_admEditId) {
    const idx = LOCS.findIndex(l => l.id === _admEditId);
    if (idx >= 0) LOCS[idx] = loc;
  } else {
    LOCS.push(loc);
  }
  try { localStorage.setItem('archwander_locs_v1', JSON.stringify(LOCS)); } catch(e) {}
  refreshApp();
  closeAdmModal();
  renderAdminTable();
}

function confirmDeleteLoc(id) {
  const loc = LOCS.find(l => l.id === id);
  if (!loc || !confirm(`"${loc.name}"을(를) 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
  LOCS.splice(LOCS.findIndex(l => l.id === id), 1);
  try { localStorage.setItem('archwander_locs_v1', JSON.stringify(LOCS)); } catch(e) {}
  refreshApp();
  renderAdminTable();
}

function confirmResetStorage() {
  if (!confirm('모든 변경사항을 삭제하고 기본 데이터로 초기화하시겠습니까?')) return;
  localStorage.removeItem('archwander_locs_v1');
  LOCS = LOCS_DEFAULT.map(l => ({...l}));
  refreshApp();
  renderAdminTable();
}

function exportDataJS() {
  const btn = document.querySelector('.adm-hbtn.adm-hbtn-export');
  if (btn) { btn.textContent = '⏳ Generating…'; btn.disabled = true; }

  const newLocs = `const LOCS_DEFAULT = ${JSON.stringify(LOCS, null, 2)};`;
  const output = `// ArchWander — Location Data\n// Edit this file to add, remove, or update locations.\n// Deploy alongside index.html (Netlify, etc.)\n// ─────────────────────────────────────────────────\n/* DATA_START */\n${newLocs}\n/* DATA_END */\n`;

  const blob = new Blob([output], {type: 'application/javascript;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.js';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);

  if (btn) { btn.textContent = '⬇ Export data.js'; btn.disabled = false; }
}
</script>
